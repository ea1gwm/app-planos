<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Blueprint grid -->
  <g stroke="#1e40af" stroke-width="1" opacity="0.35">
    <!-- Vertical lines -->
    <line x1="80"  y1="80" x2="80"  y2="432"/>
    <line x1="160" y1="80" x2="160" y2="432"/>
    <line x1="240" y1="80" x2="240" y2="432"/>
    <line x1="320" y1="80" x2="320" y2="432"/>
    <line x1="400" y1="80" x2="400" y2="432"/>
    <!-- Horizontal lines -->
    <line x1="80" y1="80"  x2="432" y2="80"/>
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="240" x2="432" y2="240"/>
    <line x1="80" y1="320" x2="432" y2="320"/>
    <line x1="80" y1="400" x2="432" y2="400"/>
  </g>

  <!-- Floor plan shape — glowing blue lines -->
  <g fill="none" stroke="url(#blue)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <!-- Outer walls -->
    <polyline points="120,130 390,130 390,380 120,380 120,130"/>
    <!-- Interior wall vertical -->
    <line x1="255" y1="130" x2="255" y2="280"/>
    <!-- Interior wall horizontal -->
    <line x1="120" y1="280" x2="320" y2="280"/>
    <!-- Door gap (missing segment) simulated with short lines -->
    <line x1="320" y1="280" x2="390" y2="280"/>
  </g>

  <!-- Door arc -->
  <path d="M 255 280 A 40 40 0 0 1 215 240"
        fill="none" stroke="#60a5fa" stroke-width="3"
        stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Dimension arrows -->
  <g stroke="#60a5fa" stroke-width="2" opacity="0.5">
    <line x1="120" y1="108" x2="390" y2="108"/>
    <polygon points="120,108 132,103 132,113" fill="#60a5fa"/>
    <polygon points="390,108 378,103 378,113" fill="#60a5fa"/>
  </g>

  <!-- Corner markers -->
  <g fill="#93c5fd" opacity="0.9">
    <circle cx="120" cy="130" r="5"/>
    <circle cx="390" cy="130" r="5"/>
    <circle cx="120" cy="380" r="5"/>
    <circle cx="390" cy="380" r="5"/>
  </g>

  <!-- Label "PLANOS" at bottom -->
  <text x="256" y="468"
        font-family="'Arial', sans-serif"
        font-weight="700"
        font-size="44"
        text-anchor="middle"
        letter-spacing="6"
        fill="#3b82f6"
        opacity="0.9">PLANOS</text>
</svg>
